services:

  mysql:
    image: mysql:8.0

    container_name: quantitymeasurementdb_v2

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: qm_db
      MYSQL_USER: quantityadmin
      MYSQL_PASSWORD: quantity@123

    ports:
      - "3307:3306"

    volumes:
      - quantitymeasurement-dbdata:/var/lib/mysql

    networks:
      - quantitymeasurement-net

  backend:
    image: 592992781575.dkr.ecr.ap-south-1.amazonaws.com/quantitymeasurement-backend:v1

    container_name: qm-app-backend

    ports:
      - "8080:8080"

    depends_on:
      - mysql

    networks:
      - quantitymeasurement-net

networks:
  quantitymeasurement-net:
    driver: bridge

volumes:
  quantitymeasurement-dbdata:
